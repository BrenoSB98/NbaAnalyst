<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="pagina-login">
    <div class="card-login">
        <div class="login-logo">
            <i class="bi bi-dribbble"></i>
            Nba Analytics
        </div>
        <p class="login-subtitulo">Entre na sua conta para acessar as principais funcionalidade.</p>
        <hr class="login-divisor">
        <div id="area-alerta"></div>
        <div id="area-sessao-expirada"></div>
        <div>
            <div class="mb-3">
                <label class="form-label-nba" for="campo-email">E-mail</label>
                <input type="email" class="form-control-nba" id="campo-email" placeholder="seu@email.com">
                <div class="mensagem-erro-campo" id="erro-email"></div>
            </div>

            <div class="mb-4">
                <label class="form-label-nba" for="campo-senha">Senha</label>
                <input type="password" class="form-control-nba" id="campo-senha" placeholder="Sua senha">
                <div class="mensagem-erro-campo" id="erro-senha"></div>
            </div>

            <button type="button" class="btn-nba btn-nba w-100" id="btn-entrar" onclick="fazerLogin()">
                <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
            </button>
        </div>
        <div class="login-rodape">
            Não tem conta? <a href="/cadastro.html">Criar conta grátis</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function() {
    if (estaLogado()) {
        window.location.href = "/index.html";
        return;
    }

    var sessaoExpirada = obterParametroUrl("sessao_expirada");
    if (sessaoExpirada === "1") {
        document.getElementById("area-sessao-expirada").innerHTML =
            '<div class="alerta-nba aviso mb-3">'
            + '<i class="bi bi-exclamation-circle-fill"></i>'
            + '<span>Sua sessão expirou. Faça login novamente.</span>'
            + '</div>';
    }

    document.getElementById("campo-senha").addEventListener("keydown", function(evento) {
        if (evento.key === "Enter") {
            fazerLogin();
        }
    });
});

function validarFormulario() {
    var tudo_ok = true;

    var email = document.getElementById("campo-email").value.trim();
    var senha = document.getElementById("campo-senha").value;

    document.getElementById("erro-email").textContent = "";
    document.getElementById("erro-senha").textContent = "";
    document.getElementById("campo-email").classList.remove("erro");
    document.getElementById("campo-senha").classList.remove("erro");

    if (email === "") {
        document.getElementById("erro-email").textContent = "Informe o seu e-mail.";
        document.getElementById("campo-email").classList.add("erro");
        tudo_ok = false;
    }

    if (senha === "") {
        document.getElementById("erro-senha").textContent = "Informe a sua senha.";
        document.getElementById("campo-senha").classList.add("erro");
        tudo_ok = false;
    }

    return tudo_ok;
}

async function fazerLogin() {
    if (!validarFormulario()) {
        return;
    }

    var email = document.getElementById("campo-email").value.trim();
    var senha = document.getElementById("campo-senha").value;
    var botao = document.getElementById("btn-entrar");

    botao.disabled = true;
    botao.innerHTML = '<i class="bi bi-hourglass-split me-2"></i>Entrando...';

    document.getElementById("area-alerta").innerHTML = "";

    try {
        var redirect = obterParametroUrl("redirect");
        await realizarLogin(email, senha, redirect);
    } catch (erro) {
        document.getElementById("area-alerta").innerHTML =
            '<div class="alerta-nba erro mb-3">'
            + '<i class="bi bi-exclamation-triangle-fill"></i>'
            + '<span>' + erro.message + '</span>'
            + '</div>';

        botao.disabled = false;
        botao.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Entrar';
    }
}
</script>
</body>
</html>
