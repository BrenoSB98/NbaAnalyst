<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="pagina-login">
    <div class="card-login">
        <div class="login-logo">
            <i class="bi bi-dribbble"></i>
            Nba Analytics
        </div>

        <div id="estado-token-invalido" style="display: none; text-align: center; padding: 16px 0;">
            <i class="bi bi-x-circle-fill" style="font-size: 2.5rem; color: #FF3B5C;"></i>
            <h2 style="font-family: 'Oswald', sans-serif; font-size: 1.3rem; color: #1A1A2E; margin: 16px 0 8px;">Link inválido</h2>
            <p style="color: #555570; font-size: 0.9rem; margin-bottom: 24px;">O link de redefinição é inválido ou não foi informado.</p>
            <a href="login.html" class="btn-nba btn-nba-outline" style="text-decoration: none; display: inline-block;">
                <i class="bi bi-arrow-left me-2"></i>Voltar ao login
            </a>
        </div>

        <div id="estado-formulario" style="display: none;">
            <p class="login-subtitulo">Crie uma nova senha para sua conta.</p>
            <hr class="login-divisor">
            <div id="area-alerta"></div>
            <div class="mb-3">
                <label class="form-label-nba" for="campo-nova-senha">Nova Senha</label>
                <input type="password" class="form-control-nba" id="campo-nova-senha" placeholder="Mínimo 6 caracteres">
                <div class="mensagem-erro-campo" id="erro-nova-senha"></div>
            </div>
            <div class="mb-4">
                <label class="form-label-nba" for="campo-confirmar-senha">Confirmar Nova Senha</label>
                <input type="password" class="form-control-nba" id="campo-confirmar-senha" placeholder="Repita a nova senha">
                <div class="mensagem-erro-campo" id="erro-confirmar-senha"></div>
            </div>
            <button type="button" class="btn-nba btn-nba w-100" id="btn-redefinir" onclick="redefinirSenha()">
                <i class="bi bi-lock-fill me-2"></i>Salvar nova senha
            </button>
        </div>

        <div id="estado-sucesso" style="display: none; text-align: center; padding: 16px 0;">
            <i class="bi bi-check-circle-fill" style="font-size: 2.5rem; color: #00A878;"></i>
            <h2 style="font-family: 'Oswald', sans-serif; font-size: 1.3rem; color: #1A1A2E; margin: 16px 0 8px;">Senha redefinida!</h2>
            <p style="color: #555570; font-size: 0.9rem; margin-bottom: 24px;">Sua senha foi alterada com sucesso. Faça login com a nova senha.</p>
            <a href="login.html" class="btn-nba btn-nba" style="text-decoration: none; display: inline-block;">
                <i class="bi bi-box-arrow-in-right me-2"></i>Entrar na conta
            </a>
        </div>

    </div>
</div>

<script src="js/api.js"></script>

<script>
var token = obterParametroUrl("token");

document.addEventListener("DOMContentLoaded", function() {
    if (!token) {
        document.getElementById("estado-token-invalido").style.display = "block";
        return;
    }

    document.getElementById("estado-formulario").style.display = "block";
});

async function redefinirSenha() {
    var novaSenha = document.getElementById("campo-nova-senha").value.trim();
    var confirmarSenha = document.getElementById("campo-confirmar-senha").value.trim();
    var alertaEl = document.getElementById("area-alerta");
    var botao = document.getElementById("btn-redefinir");

    document.getElementById("erro-nova-senha").textContent = "";
    document.getElementById("erro-confirmar-senha").textContent = "";
    document.getElementById("campo-nova-senha").classList.remove("erro");
    document.getElementById("campo-confirmar-senha").classList.remove("erro");
    alertaEl.innerHTML = "";

    var tudo_ok = true;

    if (novaSenha === "") {
        document.getElementById("erro-nova-senha").textContent = "Informe a nova senha.";
        document.getElementById("campo-nova-senha").classList.add("erro");
        tudo_ok = false;
    } else if (novaSenha.length < 6) {
        document.getElementById("erro-nova-senha").textContent = "A senha deve ter no mínimo 6 caracteres.";
        document.getElementById("campo-nova-senha").classList.add("erro");
        tudo_ok = false;
    }

    if (confirmarSenha === "") {
        document.getElementById("erro-confirmar-senha").textContent = "Confirme a nova senha.";
        document.getElementById("campo-confirmar-senha").classList.add("erro");
        tudo_ok = false;
    } else if (novaSenha !== confirmarSenha) {
        document.getElementById("erro-confirmar-senha").textContent = "As senhas não coincidem.";
        document.getElementById("campo-confirmar-senha").classList.add("erro");
        tudo_ok = false;
    }

    if (!tudo_ok) {
        return;
    }

    botao.disabled = true;
    botao.innerHTML = '<i class="bi bi-hourglass-split me-2"></i>Salvando...';

    try {
        await chamarApi("/autenticacao/redefinir-senha", "POST", {
            token: token,
            nova_senha: novaSenha
        });

        document.getElementById("estado-formulario").style.display = "none";
        document.getElementById("estado-sucesso").style.display = "block";

    } catch (erro) {
        var mensagem = "Erro ao redefinir senha. Tente novamente.";

        if (erro && erro.detail) {
            mensagem = erro.detail;
        }

        alertaEl.innerHTML =
            '<div class="alerta-nba erro mb-3">'
            + '<i class="bi bi-exclamation-triangle-fill"></i>'
            + '<span>' + mensagem + '</span>'
            + '</div>';

        botao.disabled = false;
        botao.innerHTML = '<i class="bi bi-lock-fill me-2"></i>Salvar nova senha';
    }
}
</script>

</body>
</html>
