<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palpites do Dia</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/predicoes.css">
</head>
<body>

<div id="app-wrapper">
    <nav id="navbar-principal"></nav>
    <main id="conteudo-principal">

        <div class="cabecalho-predicoes">
            <div class="container">
                <div class="linha-acento mb-2"></div>
                <h1 class="titulo-secao mb-2">Palpites do Dia</h1>
                <div class="resumo-dia" id="resumo-dia" style="display:none;">
                    <div class="resumo-item">
                        <span class="resumo-valor" id="resumo-jogos">—</span>
                        <span class="resumo-rotulo">Jogos Hoje</span>
                    </div>
                    <div class="resumo-item">
                        <span class="resumo-valor" id="resumo-palpites">—</span>
                        <span class="resumo-rotulo">Palpites Gerados</span>
                    </div>
                    <div class="resumo-item">
                        <span class="resumo-valor" id="resumo-data">—</span>
                        <span class="resumo-rotulo">Data</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="area-predicoes">
            <div class="container" style="padding-top:28px;padding-bottom:48px;">

                <div id="pagina-carregando">
                    <div class="spinner-nba">
                        <div class="bola-animada"></div>
                        <span>Carregando palpites...</span>
                    </div>
                </div>

                <div id="pagina-conteudo" style="display:none;">
                    <div id="lista-jogos"></div>
                </div>

                <div id="pagina-sem-jogos" style="display:none;">
                    <div class="estado-vazio">
                        <i class="bi bi-calendar-x icone-vazio"></i>
                        <p class="titulo-vazio">Nenhum jogo hoje</p>
                        <p class="desc-vazio">Não há partidas agendadas para hoje na temporada atual.</p>
                    </div>
                </div>

                <div id="pagina-aguardando" style="display:none;">
                    <div class="estado-vazio">
                        <i class="bi bi-hourglass-split icone-vazio"></i>
                        <p class="titulo-vazio">Palpites sendo processados</p>
                        <p class="desc-vazio">Há <strong id="desc-n-jogos">—</strong> jogo(s) hoje. Os palpites são gerados automaticamente após a carga diária dos dados (06h).</p>
                    </div>
                </div>

            </div>
        </div>
    </main>
    <footer id="rodape-principal"></footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/componentes.js"></script>

<script>
verificarAutenticacao();

var MAX_JOGADORES_POR_TIME = 8;

document.addEventListener("DOMContentLoaded", function() {
    inicializarPagina();
    carregarPalpites();
});

function esconderTudos() {
    document.getElementById("pagina-carregando").style.display = "none";
    document.getElementById("pagina-conteudo").style.display = "none";
    document.getElementById("pagina-sem-jogos").style.display = "none";
    document.getElementById("pagina-aguardando").style.display = "none";
}

async function carregarPalpites() {
    try {
        var dados = await chamarApiAutenticada("/predicoes/hoje");

        esconderTudos();

        document.getElementById("resumo-jogos").textContent = dados.total_jogos;
        document.getElementById("resumo-palpites").textContent = dados.total_predicoes;
        document.getElementById("resumo-data").textContent = dados.data || "—";
        document.getElementById("resumo-dia").style.display = "flex";

        if (dados.total_jogos === 0) {
            document.getElementById("pagina-sem-jogos").style.display = "block";
            return;
        }

        if (!dados.predicoes || dados.predicoes.length === 0) {
            document.getElementById("desc-n-jogos").textContent = dados.total_jogos;
            document.getElementById("pagina-aguardando").style.display = "block";
            return;
        }

        renderizarJogos(dados.predicoes);
        document.getElementById("pagina-conteudo").style.display = "block";

    } catch (erro) {
        esconderTudos();
        document.getElementById("pagina-sem-jogos").style.display = "block";
    }
}

function renderizarJogos(palpites) {
    var container = document.getElementById("lista-jogos");
    var jogos = {};
    for (var i = 0; i < palpites.length; i++) {
        var p = palpites[i];
        var gid = p.game_id;

        if (!jogos[gid]) {
            jogos[gid] = {};
            jogos[gid]["nome_casa"]  = "";
            jogos[gid]["nome_fora"]  = "";
            jogos[gid]["time_casa"]  = [];
            jogos[gid]["time_fora"]  = [];
        }

        if (p.eh_casa === 1 || p.eh_casa === true) {
            if (!jogos[gid]["nome_casa"]) {
                jogos[gid]["nome_casa"] = p.nome_time || "";
            }
            jogos[gid]["time_casa"].push(p);
        } else {
            if (!jogos[gid]["nome_fora"]) {
                jogos[gid]["nome_fora"] = p.nome_time || "";
            }
            jogos[gid]["time_fora"].push(p);
        }
    }

    var html = "";
    var ids = Object.keys(jogos);

    for (var j = 0; j < ids.length; j++) {
        var gid = ids[j];
        var jogo = jogos[gid];

        jogo["time_casa"].sort(function(a, b) {
            var pa = parseFloat(a.pontos_previstos) || 0;
            var pb = parseFloat(b.pontos_previstos) || 0;
            if (pb > pa) { return 1; }
            if (pb < pa) { return -1; }
            return 0;
        });

        jogo["time_fora"].sort(function(a, b) {
            var pa = parseFloat(a.pontos_previstos) || 0;
            var pb = parseFloat(b.pontos_previstos) || 0;
            if (pb > pa) { return 1; }
            if (pb < pa) { return -1; }
            return 0;
        });

        var jogadoresCasa = [];
        for (var k = 0; k < jogo["time_casa"].length; k++) {
            if (k >= MAX_JOGADORES_POR_TIME) { break; }
            jogadoresCasa.push(jogo["time_casa"][k]);
        }

        var jogadoresFora = [];
        for (var k = 0; k < jogo["time_fora"].length; k++) {
            if (k >= MAX_JOGADORES_POR_TIME) { break; }
            jogadoresFora.push(jogo["time_fora"][k]);
        }

        html = html + '<div class="card-jogo-palpite">';
        html = html + '<div class="jogo-titulo" onclick="toggleJogo(this)">';
        html = html + '<div class="times-nome">' + jogo["nome_casa"] + '<span>vs</span>' + jogo["nome_fora"] + '</div>';
        html = html + '<i class="bi bi-chevron-down jogo-seta aberto"></i>';
        html = html + '</div>';
        html = html + '<div class="jogo-corpo">';
        html = html + '<div class="times-grid">';
        html = html + '<div class="time-coluna">';
        html = html + '<div class="time-coluna-titulo casa">' + jogo["nome_casa"] + ' <span style="font-size:.62rem;color:#9999B0;margin-left:4px;">Casa</span></div>';
        html = html + renderizarColunaTimes(jogadoresCasa);
        html = html + '</div>';
        html = html + '<div class="time-coluna">';
        html = html + '<div class="time-coluna-titulo">' + jogo["nome_fora"] + ' <span style="font-size:.62rem;color:#9999B0;margin-left:4px;">Fora</span></div>';
        html = html + renderizarColunaTimes(jogadoresFora);
        html = html + '</div>';
        html = html + '</div>';
        html = html + '</div>';
        html = html + '</div>';
    }

    container.innerHTML = html;
}

function renderizarColunaTimes(jogadores) {
    if (jogadores.length === 0) {
        return '<p style="font-size:.78rem;color:#9999B0;padding:8px 0;">Sem palpites.</p>';
    }

    var html = "";

    for (var i = 0; i < jogadores.length; i++) {
        var p = jogadores[i];

        var pts = "—";
        if (p.pontos_previstos !== null && p.pontos_previstos !== undefined) {
            pts = parseFloat(p.pontos_previstos).toFixed(1);
        }

        var ast = "—";
        if (p.assistencias_previstas !== null && p.assistencias_previstas !== undefined) {
            ast = parseFloat(p.assistencias_previstas).toFixed(1);
        }

        var reb = "—";
        if (p.rebotes_previstos !== null && p.rebotes_previstos !== undefined && parseFloat(p.rebotes_previstos) > 0) {
            reb = parseFloat(p.rebotes_previstos).toFixed(1);
        }

        html = html + '<div class="linha-jogador">';
        html = html + '<div class="jogador-nome"><a href="jogador.html?id=' + p.player_id + '">' + p.nome_jogador + '</a></div>';
        html = html + '<div class="stats-inline">';
        html = html + '<div class="stat-pill"><div class="valor" style="color:#F75C03;">' + pts + '</div><div class="rotulo">PTS</div></div>';
        html = html + '<div class="stat-pill"><div class="valor" style="color:#3B9EFF;">' + ast + '</div><div class="rotulo">AST</div></div>';
        html = html + '<div class="stat-pill"><div class="valor" style="color:#00C896;">' + reb + '</div><div class="rotulo">REB</div></div>';
        html = html + '</div>';
        html = html + '</div>';
    }

    return html;
}

function toggleJogo(header) {
    var corpo = header.nextElementSibling;
    var seta = header.querySelector(".jogo-seta");

    if (corpo.style.display === "none") {
        corpo.style.display = "block";
        seta.classList.add("aberto");
    } else {
        corpo.style.display = "none";
        seta.classList.remove("aberto");
    }
}
</script>
</body>
</html>
