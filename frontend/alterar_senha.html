<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alterar Senha</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/perfil.css">
</head>
<body>

<div id="app-wrapper">
    <nav id="navbar-principal"></nav>

    <main id="conteudo-principal">

        <div class="cabecalho-perfil">
            <div class="container">
                <div class="d-flex align-items-center gap-3">
                    <a href="perfil.html" class="btn-nba-ghost btn-nba btn-sm">
                        <i class="bi bi-arrow-left me-1"></i> Voltar ao perfil
                    </a>
                    <h1 class="perfil-nome mb-0" style="font-size: 1.4rem;">Alterar Senha</h1>
                </div>
            </div>
        </div>

        <div class="secao-perfil">
            <div class="container">
                <div class="row">
                    <div class="col-12 col-md-5">
                        <div id="msg-senha" style="display: none; margin-bottom: 16px;"></div>
                        <div style="margin-bottom: 14px;">
                            <label class="form-label-nba" for="input-senha-atual">Senha Atual</label>
                            <input type="password" id="input-senha-atual" class="form-control-nba" placeholder="Digite sua senha atual">
                        </div>
                        <div style="margin-bottom: 14px;">
                            <label class="form-label-nba" for="input-nova-senha">Nova Senha</label>
                            <input type="password" id="input-nova-senha" class="form-control-nba" placeholder="Mínimo 6 caracteres">
                        </div>
                        <div style="margin-bottom: 24px;">
                            <label class="form-label-nba" for="input-confirmar-senha">Confirmar Nova Senha</label>
                            <input type="password" id="input-confirmar-senha" class="form-control-nba" placeholder="Repita a nova senha">
                        </div>
                        <button class="btn-nba btn-sm" id="btn-alterar-senha" onclick="alterarSenha()">
                            <i class="bi bi-lock-fill me-1"></i> Salvar Nova Senha
                        </button>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <footer id="rodape-principal"></footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/componentes.js"></script>

<script>
verificarAutenticacao();

document.addEventListener("DOMContentLoaded", function() {
    inicializarPagina();
});

async function alterarSenha() {
    var senhaAtual = document.getElementById("input-senha-atual").value.trim();
    var novaSenha = document.getElementById("input-nova-senha").value.trim();
    var confirmarSenha = document.getElementById("input-confirmar-senha").value.trim();
    var msgEl = document.getElementById("msg-senha");
    var btnEl = document.getElementById("btn-alterar-senha");

    msgEl.style.display = "none";
    msgEl.className = "";
    msgEl.textContent = "";

    if (!senhaAtual || !novaSenha || !confirmarSenha) {
        msgEl.textContent = "Preencha todos os campos.";
        msgEl.className = "alerta-erro";
        msgEl.style.display = "block";
        return;
    }

    if (novaSenha.length < 6) {
        msgEl.textContent = "A nova senha deve ter no mínimo 6 caracteres.";
        msgEl.className = "alerta-erro";
        msgEl.style.display = "block";
        return;
    }

    if (novaSenha !== confirmarSenha) {
        msgEl.textContent = "A nova senha e a confirmação não coincidem.";
        msgEl.className = "alerta-erro";
        msgEl.style.display = "block";
        return;
    }

    btnEl.disabled = true;
    btnEl.textContent = "Salvando...";

    try {
        await chamarApiAutenticada("/autenticacao/eu/senha", "PATCH", {
            senha_atual: senhaAtual,
            nova_senha: novaSenha
        });

        document.getElementById("input-senha-atual").value = "";
        document.getElementById("input-nova-senha").value = "";
        document.getElementById("input-confirmar-senha").value = "";

        msgEl.textContent = "Senha alterada com sucesso.";
        msgEl.className = "alerta-sucesso";
        msgEl.style.display = "block";

    } catch (erro) {
        var mensagem = "Erro ao alterar senha.";
        if (erro && erro.detail) {
            mensagem = erro.detail;
        }
        msgEl.textContent = mensagem;
        msgEl.className = "alerta-erro";
        msgEl.style.display = "block";
    }

    btnEl.disabled = false;
    btnEl.innerHTML = '<i class="bi bi-lock-fill me-1"></i> Salvar Nova Senha';
}
</script>

</body>
</html>
