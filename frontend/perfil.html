<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/perfil.css">
</head>
<body>

<div id="app-wrapper">
    <nav id="navbar-principal"></nav>

    <main id="conteudo-principal">

        <div id="pagina-carregando">
            <div class="spinner-nba" style="margin-top: 80px;">
                <div class="bola-animada"></div>
                <span>Carregando perfil...</span>
            </div>
        </div>

        <div id="pagina-conteudo" style="display: none;">

            <div class="cabecalho-perfil">
                <div class="container">
                    <div class="d-flex align-items-center gap-4 flex-wrap">
                        <div class="perfil-avatar" id="perfil-avatar">?</div>
                        <div>
                            <h1 class="perfil-nome" id="perfil-nome">—</h1>
                            <p class="perfil-membro" id="perfil-membro"></p>
                        </div>

                    </div>
                </div>
            </div>

            <div class="secao-perfil">
                <div class="container">
                    <h2 class="titulo-secao mb-3" style="font-size: 1.1rem;">Dados da Conta</h2>
                    <div class="row g-3" id="dados-conta"></div>
                </div>
            </div>

            <div class="secao-perfil">
                <div class="container">
                    <h2 class="titulo-secao mb-3" style="font-size: 1.1rem;">Time Favorito</h2>

                    <div id="time-fav-carregando" class="texto-suave" style="font-size: 0.88rem;">
                        Carregando...
                    </div>

                    <div id="time-fav-conteudo" style="display: none;"></div>

                    <div id="time-fav-vazio" style="display: none;">
                        <p class="texto-suave" style="font-size: 0.88rem; margin-bottom: 16px;">
                            Nenhum time favorito definido.
                        </p>
                    </div>

                    <div id="time-fav-seletor" style="display: none; margin-top: 16px;">
                        <div class="d-flex align-items-center gap-3 flex-wrap">
                            <select class="form-control-nba" id="select-time-favorito" style="max-width: 280px;">
                                <option value="">Selecione um time...</option>
                            </select>
                            <button class="btn-nba btn-sm" id="btn-salvar-time" onclick="salvarTimeFavorito()">
                                <i class="bi bi-check-lg me-1"></i>Salvar
                            </button>
                            <button class="btn-nba-ghost btn-nba btn-sm" onclick="cancelarSelecaoTime()">
                                Cancelar
                            </button>
                        </div>
                        <div id="msg-time-favorito" style="margin-top: 10px;"></div>
                    </div>

                    <div style="margin-top: 12px;">
                        <button class="btn-nba-outline btn-nba btn-sm" id="btn-trocar-time" onclick="mostrarSeletorTime()" style="display: none;">
                            <i class="bi bi-pencil me-1"></i>Trocar time favorito
                        </button>
                    </div>
                </div>
            </div>

            <div class="secao-perfil">
                <div class="container">
                    <h2 class="titulo-secao mb-3" style="font-size: 1.1rem;">Acesso Rápido</h2>
                    <div class="d-flex gap-2 flex-wrap">
                        <a href="predicoes.html" class="btn-nba-outline btn-nba btn-sm">
                            <i class="bi bi-graph-up-arrow me-1"></i> Palpites
                        </a>
                        <a href="confrontos.html" class="btn-nba-outline btn-nba btn-sm">
                            <i class="bi bi-bar-chart-steps me-1"></i> Confrontos
                        </a>
                        <a href="estatisticas.html" class="btn-nba-outline btn-nba btn-sm">
                            <i class="bi bi-bar-chart-fill me-1"></i> Estatísticas
                        </a>
                        <a href="onerb.html" class="btn-nba-outline btn-nba btn-sm">
                            <i class="bi bi-robot me-1"></i> Onerb IA
                        </a>
                    </div>
                </div>
            </div>

        </div>

    </main>

    <footer id="rodape-principal"></footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/componentes.js"></script>

<script>
verificarAutenticacao();

var todosOsTimes = [];

document.addEventListener("DOMContentLoaded", function() {
    inicializarPagina();
    carregarPerfil();
});

async function carregarPerfil() {
    try {
        var usuario = await chamarApiAutenticada("/autenticacao/eu");

        var iniciais = obterInicialNome(usuario.full_name);
        document.getElementById("perfil-avatar").textContent = iniciais;
        document.getElementById("perfil-nome").textContent = usuario.full_name;
        document.getElementById("perfil-email").textContent = usuario.email;

        if (usuario.created_at) {
            var dtCriado = new Date(usuario.created_at);
            var membroDesde = dtCriado.toLocaleDateString("pt-BR", { month: "long", year: "numeric" });
            document.getElementById("perfil-membro").textContent = "Membro desde " + membroDesde;
        }

        renderizarDadosConta(usuario);

        document.getElementById("pagina-carregando").style.display = "none";
        document.getElementById("pagina-conteudo").style.display = "block";

        carregarTimeFavorito(usuario.favorite_team_id);
        carregarListaTimes();

    } catch (erro) {
        document.getElementById("pagina-carregando").style.display = "none";
        document.getElementById("pagina-conteudo").style.display = "block";
    }
}

function renderizarDadosConta(usuario) {
    var nascimento = "—";
    if (usuario.birth_date) {
        var dt = new Date(usuario.birth_date + "T00:00:00");
        nascimento = dt.toLocaleDateString("pt-BR");
    }

    var html = ""
        + '<div class="col-6 col-md-3">'
        +   '<div class="dado-cadastral-rotulo">Nome</div>'
        +   '<div class="dado-cadastral-valor">' + (usuario.full_name || "—") + '</div>'
        + '</div>'
        + '<div class="col-6 col-md-3">'
        +   '<div class="dado-cadastral-rotulo">E-mail</div>'
        +   '<div class="dado-cadastral-valor">' + (usuario.email || "—") + '</div>'
        + '</div>'
        + '<div class="col-6 col-md-3">'
        +   '<div class="dado-cadastral-rotulo">Nascimento</div>'
        +   '<div class="dado-cadastral-valor">' + nascimento + '</div>'
        + '</div>';

    document.getElementById("dados-conta").innerHTML = html;
}

async function carregarListaTimes() {
    try {
        var resposta = await chamarApi("/times?nba_franchise=true&page_size=30");
        var lista = resposta.times || [];

        todosOsTimes = lista;

        var select = document.getElementById("select-time-favorito");
        select.innerHTML = '<option value="">Selecione um time...</option>';

        for (var i = 0; i < lista.length; i++) {
            var time = lista[i];
            var option = document.createElement("option");
            option.value = time.id;
            option.textContent = time.nome || time.name;
            select.appendChild(option);
        }
    } catch (erro) {
        // silencioso
    }
}

async function carregarTimeFavorito(timeId) {
    document.getElementById("time-fav-carregando").style.display = "none";

    if (!timeId) {
        document.getElementById("time-fav-vazio").style.display = "block";
        document.getElementById("btn-trocar-time").style.display = "inline-flex";
        return;
    }

    try {
        var time = await chamarApi("/times/" + timeId);

        var logoHtml = "";
        if (time.logo) {
            logoHtml = '<img src="' + time.logo + '" alt="' + time.nome + '" class="time-logo-fav">';
        } else {
            var codigo = time.codigo || (time.nome || "NBA").substring(0, 3).toUpperCase();
            logoHtml = '<div class="time-placeholder-fav">' + codigo + '</div>';
        }

        var conferencia = "";
        if (time.info_liga) {
            conferencia = (time.info_liga.conferencia || "") + " · " + (time.info_liga.divisao || "");
        }

        var html = ""
            + '<a href="time.html?id=' + time.id + '" class="card-time-favorito">'
            +   logoHtml
            +   '<div>'
            +     '<div class="time-nome-fav">' + time.nome + '</div>'
            +     '<div class="time-label-fav">' + conferencia + '</div>'
            +   '</div>'
            +   '<i class="bi bi-chevron-right ms-auto texto-suave"></i>'
            + '</a>';

        document.getElementById("time-fav-conteudo").innerHTML = html;
        document.getElementById("time-fav-conteudo").style.display = "block";
        document.getElementById("btn-trocar-time").style.display = "inline-flex";

    } catch (erro) {
        document.getElementById("time-fav-vazio").style.display = "block";
        document.getElementById("btn-trocar-time").style.display = "inline-flex";
    }
}

function mostrarSeletorTime() {
    document.getElementById("time-fav-seletor").style.display = "block";
    document.getElementById("btn-trocar-time").style.display = "none";
}

function cancelarSelecaoTime() {
    document.getElementById("time-fav-seletor").style.display = "none";
    document.getElementById("msg-time-favorito").innerHTML = "";
    document.getElementById("btn-trocar-time").style.display = "inline-flex";
}

async function salvarTimeFavorito() {
    var select = document.getElementById("select-time-favorito");
    var timeId = select.value;
    var msgEl = document.getElementById("msg-time-favorito");
    var botao = document.getElementById("btn-salvar-time");

    msgEl.innerHTML = "";

    if (!timeId) {
        msgEl.innerHTML = '<span style="color:#FF3B5C; font-size:0.85rem;">Selecione um time.</span>';
        return;
    }

    botao.disabled = true;
    botao.textContent = "Salvando...";

    try {
        await chamarApiAutenticada("/autenticacao/eu/time-favorito", "PATCH", {
            favorite_team_id: parseInt(timeId)
        });

        document.getElementById("time-fav-conteudo").innerHTML = "";
        document.getElementById("time-fav-conteudo").style.display = "none";
        document.getElementById("time-fav-vazio").style.display = "none";
        document.getElementById("time-fav-seletor").style.display = "none";

        document.getElementById("time-fav-carregando").style.display = "block";
        document.getElementById("time-fav-carregando").textContent = "Carregando...";

        await carregarTimeFavorito(parseInt(timeId));

    } catch (erro) {
        msgEl.innerHTML = '<span style="color:#FF3B5C; font-size:0.85rem;">Erro ao salvar. Tente novamente.</span>';
    }

    botao.disabled = false;
    botao.innerHTML = '<i class="bi bi-check-lg me-1"></i>Salvar';
}
</script>

</body>
</html>
